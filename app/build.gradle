plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    id 'edu.sc.seis.launch4j' version '3.0.6'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

def osName = System.getProperty("os.name").toLowerCase()
def javafxVersion = "23.0.2" // JavaFX version
def javafxPlatform = osName.contains("win") ? "win" : osName.contains("linux") ? "linux" : osName.contains("mac") ? "mac" : null
def javafxSdkPath = "${rootProject.projectDir}/javafx-sdk" // Local path to store the SDK

// Task to download and extract JavaFX SDK
tasks.register('downloadJavaFxSdk') {
    doLast {
        // Check if the SDK directory already exists
        if (file(javafxSdkPath).exists()) {
            println "JavaFX SDK already exists at $javafxSdkPath. Skipping download."
            return // Exit the task if the SDK is already present
        }

        if (javafxPlatform == null) {
            throw new RuntimeException("Unsupported operating system: $osName")
        }

        def javafxUrl = "https://download2.gluonhq.com/openjfx/23.0.2/openjfx-23.0.2_windows-x64_bin-sdk.zip"
        def javafxZip = "${projectDir}/javafx-sdk.zip"

        // Create the javafx-sdk directory if it doesn't exist
        mkdir(javafxSdkPath)

        // Download the JavaFX SDK
        println "Downloading JavaFX SDK from $javafxUrl..."
        new URL(javafxUrl).withInputStream { input ->
            new File(javafxZip).withOutputStream { output ->
                output << input
            }
        }

        // Extract the SDK
        println "Extracting JavaFX SDK to $javafxSdkPath..."
        copy {
            from zipTree(javafxZip)
            into javafxSdkPath
        }

        // Clean up the zip file
        delete javafxZip
    }
}


// Ensure the SDK is downloaded before running or building
tasks.withType(JavaExec) {
    dependsOn 'downloadJavaFxSdk'
}
tasks.withType(com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    dependsOn 'downloadJavaFxSdk'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation libs.guava
    implementation 'com.adobe.xmp:xmpcore:6.1.11'
    implementation 'com.drewnoakes:metadata-extractor:2.19.0'
    implementation 'io.github.cdimascio:dotenv-java:3.2.0'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.18.3'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.3'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.18.3'
    implementation 'com.cloudinary:cloudinary-http5:2.2.0'
    implementation 'com.cloudinary:cloudinary-core:2.2.0'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

jar {
    manifest {
        attributes 'Main-Class': 'org.example.App' // Change to your main class
    }
}

javafx {
    version = "23.0.2"
    modules = [ 'javafx.controls', 'javafx.base', 'javafx.graphics', 'javafx.swing']
}

shadowJar {
    archiveBaseName.set("forrealdatingapp")
    archiveClassifier.set("")
    archiveVersion.set("")
    
    mergeServiceFiles()
    
    // Include .env file in the root of the JAR
    from('.') {
        include '.env'
    }
    
    manifest {
        attributes["Main-Class"] = "org.example.App"
    }
}
def launch4jOutputDir = "${buildDir}/launch4j"
def copiedJavafxSdkPath = "${launch4jOutputDir}/javafx-sdk"

launch4j {
    mainClassName = 'org.example.App'
    outfile = 'forrealdatingapp.exe'
    // jarTask instead of jar (points to your JAR-producing task)
    jarTask = project.tasks.shadowJar
    jvmOptions = ["-Xms256m", "-Xmx1024m", "--module-path",  "javafx-sdk/javafx-sdk-23.0.2/lib", "--add-modules", "javafx.base,javafx.controls,javafx.graphics,javafx.swing"]
    bundledJrePath = 'jre'
    // Only needed if using custom dependencies
    dontWrapJar = true 
    outputDir = launch4jOutputDir
}
task copyJavafxSdk(type: Copy) {
    from "${rootProject.projectDir}/javafx-sdk"
    into copiedJavafxSdkPath
    
}

tasks.register('zipLaunch4j', Zip) {
    dependsOn 'createExe'
    archiveFileName = "forrealdatingapp.zip" // Custom name with version
    destinationDirectory = file("${buildDir}/distributions")

    from("${rootProject.projectDir}/app/build/launch4j") {
        include '**/*'
    }

    doLast {
        println "Created zip archive at ${archiveFile.get()}"
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

run {
    jvmArgs = [
        "--module-path", javafxSdkPath + "/lib", 
        "--add-modules", "javafx.base,javafx.controls,javafx.graphics" // Specify the modules here as well
    ]
}